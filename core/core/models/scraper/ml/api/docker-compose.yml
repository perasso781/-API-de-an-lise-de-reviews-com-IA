services:
  api:
    build: .
    container_name: review_intel_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - model_data:/app/ml/saved_model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  model_data:
